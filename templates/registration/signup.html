{% extends "base.html" %}

{% block content %}

<h2>Sign Up</h2>

<p> Create a new account to access the route planning features.</p>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Create Account</button>
</form>

<p><a href="{% url 'login' %}">Already have an account? Login here</a></p>

{% endblock %}
