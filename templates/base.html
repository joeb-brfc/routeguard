<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>RouteGuard</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>
  <body>
    <header>
      <h1>RouteGuard</h1>
      <nav>
        <a href="{% url 'home' %}" class="{% if request.path == '/' %}active{% endif %}">Home</a>
        <a href="{% url 'assignment_list' %}" class="{% if 'assignments' in request.path %}active{% endif %}">Assignments</a>
        <a href="{% url 'driver_list' %}" class="{% if 'drivers' in request.path %}active{% endif %}">Drivers</a>
        <a href="{% url 'route_list' %}" class="{% if 'routes' in request.path %}active{% endif %}">Routes</a>
        <a href="{% url 'availability_list' %}" class="{% if 'availabilities' in request.path %}active{% endif %}">Availabilities</a>

        {% if user.is_authenticated %}
        <a href="{% url 'logout' %}">Logout</a>
        {% else %}
        <a href="{% url 'login' %}">Login</a>
        <a href="{% url 'signup' %}">Sign Up</a>
        {% endif %}
      </nav>
      <hr />
    </header>

    <main>
      {% if messages %}
      <ul class="message-list">
        {% for message in messages %}
        <li>{{ message }}</li>
        {% endfor %}
      </ul>
      {% endif %} {% block content %} {% endblock %}
    </main>
    <script src="{% static 'js/script.js' %}"></script>
  </body>
</html>
