{% extends "base.html" %}

{% block content %}

<h2>Add Assignment</h2>

<p>Create a new assignment by selecting a driver, route, date, and times.</p>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save Assignment</button>
</form>

<p><a href="{% url 'assignment_list' %}">Back to Assignments</a></p>

{% endblock %}
