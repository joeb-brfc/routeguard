{% extends "base.html" %}

{% block content %}

<h2>Delete Driver</h2>

<p>Are you sure you want to delete {{ driver.name }}?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, Delete Driver</button>
</form>

<p><a href="{% url 'driver_list' %}">Cancel</a></p>

{% endblock %}
