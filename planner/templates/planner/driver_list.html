{% extends "base.html" %}

{% block content %}

<h2>Drivers</h2>

{% if drivers %}
    <table>
        <thead>
            <tr>
                <th>Driver Name</th>
            </tr>
        </thead>
        <tbody>
            {% for driver in drivers %}
                <tr>
                    <td>{{ driver.name }}</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
{% else %}
    <p>No drivers have been added yet.</p>
{% endif %}

{% endblock %}
